services:
  personaplex:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8998:8998"
    environment:
      - NO_TORCH_COMPILE=1
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    command: >
      /app/moshi/.venv/bin/python -m moshi.server
      --ssl /app/ssl
      --moshi-hf-repo abrarfahim/moshi-tool-finetuned
    volumes:
      - ./.cache:/root/.cache
